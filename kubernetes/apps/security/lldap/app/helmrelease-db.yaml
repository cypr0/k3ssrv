---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: lldap-postgresql
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: 13.2.5
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    auth:
      username: ${INIT_POSTGRES_USER}
      password: ${INIT_POSTGRES_PASS}
      database: ${INIT_POSTGRES_DBNAME}
    primary:
      persistence:
        enabled: true
        existingClaim: lldap-postgresql-pvc
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    envFrom:
      - secretRef:
          name: lldap-secret
