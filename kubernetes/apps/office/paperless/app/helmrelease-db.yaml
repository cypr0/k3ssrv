---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: paperless-postgresql
  namespace: office
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: 13.2.5
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    auth:
      existingSecret: paperless-secret
      secretKeys:
        userPasswordKey: INIT_POSTGRES_PASS
        adminPasswordKey: INIT_POSTGRES_SUPER_PASS
      username: ${PAPERLESS_DB_USER}
      database: ${PAPERLESS_DB_NAME}
    primary:
      persistence:
        enabled: true
        existingClaim: paperless-postgresql-pvc
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
