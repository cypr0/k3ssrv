---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app nextcloud
  namespace: office
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud
      version: 4.5.5
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    replicaCount: 2
    image:
      repository: nextcloud
      tag: 27.1.4-apache
      pullPolicy: IfNotPresent
    nginx:
      enabled: false
    lifecycle:
      postStartCommand: ["/bin/sh", "-c", "echo \"ServerName cloud.${SECRET_DOMAIN}\" | tee -a /etc/apache2/apache2.conf"]
    nextcloud:
      host: &host cloud.${SECRET_DOMAIN}
      strategy:
        type: RollingUpdate
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' =>
            array (
              0 => '${SERVICE_CIDR}',
              1 => '${NODE_CIDR}',
              2 => '127.0.0.1',
              3 => 'nextcloud',
              4 => '192.168.0.0/16',
            ),
            'trusted_domains' =>
            array (
              0 => '${SECRET_DOMAIN}',
              1 => 'cloud.${SECRET_DOMAIN}',
            ),
            'forwarded_for_headers' =>
            array (
              0 => 'HTTP_X_FORWARDED_FOR',
            ),
            'overwrite.cli.url' => 'https://cloud.${SECRET_DOMAIN}',
            'overwriteprotocol' => 'https',
            'skeletondirectory' => '',
            'bulkupload.enabled' => 'false',
            'default_phone_region' => 'DE',
            'upload_max_filesize = 16G',
            'post_max_size = 16G',
            'max_input_time = 3600',
            'max_execution_time = 3600',
          );
      datadir: /var/data
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
        # tokenKey: METRICS_TOKEN
        smtpHostKey: smtp-host
        smtpUsernameKey: smtp-username
        smtpPasswordKey: smtp-password
      extraEnv:
        - name: REDIS_HOST
          value: redis-master.database
        - name: REDIS_HOST_PORT
          value: "6379"

      mail:
        enabled: true
        fromAddress: admin
        domain: ${SECRET_DOMAIN}
        smtp:
          port: 465
          authtype: LOGIN
      # securityContext:
      #   runAsUser: 1000
      #   runAsGroup: 1000
      #   runAsNonRoot: true
      #   readOnlyRootFilesystem: false
    redis:
      enabled: false
      # auth:
      #   enabled: true
      #   redis.auth.existingSecret: nextcloud-secret
      #   redis.auth.existingSecretPasswordKey: NEXTCLOUD_REDIS_PASSWORD
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: 'postgresql'
      host: postgres-nextcloud-rw
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: database-username
        passwordKey: database-password
        databaseKey: database-name
    cronjob:
      enabled: true
      failedJobsHistoryLimit: 1
      successfulJobsHistoryLimit: 1
    ingress:
      enabled: true
      className: "external"
      # servicePort: http
      annotations:
        external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        nginx.ingress.kubernetes.io/proxy-body-size: "10G"
        nginx.ingress.kubernetes.io/proxy-buffering: "off"
        nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
        nginx.ingress.kubernetes.io/server-snippet: |-
          server_tokens off;
          proxy_hide_header X-Powered-By;
          rewrite ^/.well-known/webfinger /index.php/.well-known/webfinger last;
          rewrite ^/.well-known/nodeinfo /index.php/.well-known/nodeinfo last;
          rewrite ^/.well-known/host-meta.json /public.php?service=host-meta-json;
          location = /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
          }
          location = /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
          }
          location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
          }
          location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
            deny all;
          }
          location ~ ^/(?:autotest|occ|issue|indie|db_|console) {
            deny all;
          }
      path: /
      pathType: Prefix
      tls:
        - hosts:
            - *host
    persistence:
      enabled: true
      existingClaim: nextcloud-config-pvc
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data-pvc
    livenessProbe:
      enabled: false
    readinessProbe:
      enabled: false
