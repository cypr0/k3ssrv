---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app nextcloud
  namespace: office
spec:
  interval: 30m
  chart:
    spec:
      chart: nextcloud
      version: 4.5.4
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: nextcloud
      tag: 27.1.4-fpm-alpine
      pullPolicy: IfNotPresent

    fullnameOverride: *app

    replicaCount: 2

    ingress:
      enabled: true
      className: external
      annotations:
        external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        nginx.ingress.kubernetes.io/proxy-body-size: 4G
        nginx.ingress.kubernetes.io/server-snippet: |-
          server_tokens off;
          proxy_hide_header X-Powered-By;
          rewrite ^/.well-known/webfinger /index.php/.well-known/webfinger last;
          rewrite ^/.well-known/nodeinfo /index.php/.well-known/nodeinfo last;
          rewrite ^/.well-known/host-meta /public.php?service=host-meta last;
          rewrite ^/.well-known/host-meta.json /public.php?service=host-meta-json;
          location = /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
          }
          location = /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
          }
          location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
          }
          location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
            deny all;
          }
          location ~ ^/(?:autotest|occ|issue|indie|db_|console) {
            deny all;
          }
      tls:
        hosts:
          - &host cloud.${SECRET_DOMAIN}
      path: /
      pathType: Prefix

    phpClientHttpsFix:
      enabled: false
      protocol: https

    nextcloud:
      host: *host
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
        tokenKey: nextcloud-token
        smtpUsernameKey: smtp-username
        smtpPasswordKey: smtp-password
        smtpHostKey: smtp-host
      update: 0
      datadir: /var/data
      persistence:
        enabled: true
        existingClaim: nextcloud-config-pvc
        nextcloudData:
          enabled: true
          existingClaim: nextcloud-data-pvc
      mail:
        enabled: true
        fromAddress: admin
        domain: ${SECRET_DOMAIN}
        smtp:
          secure: ssl
          port: 465
          authtype: LOGIN
      defaultConfigs:
        redis.config.php: false
      phpConfigs:
          uploadLimit.ini: |
            upload_max_filesize = 16G
            post_max_size = 16G
            max_input_time = 3600
            max_execution_time = 3600
            default_phone_region = DE
          pgsql.ini: |
            extension=pdo_pgsql.so
            extension=pgsql.so
            [PostgresSQL]
            pgsql.allow_persistent = On
            pgsql.auto_reset_persistent = Off
            pgsql.max_persistent = -1
            pgsql.max_links = -1
            pgsql.ignore_notice = 0
            pgsql.log_notice = 0
      configs:
        redis.config.php: |-
          <?php
          $CONFIG = array (
            'memcache.distributed' => '\OC\Memcache\Redis',
            'memcache.locking' => '\OC\Memcache\Redis',
            'memcache.local' => '\OC\Memcache\Redis',
            'redis' => array(
              'host' => 'redis.database.svc.cluster.local',
              'port' => 6379,
            ),
          );
        proxy.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_proxies' =>
            array(
               0 => '${CLUSTER_CIDR}',
            ),
            'forwarded_for_headers' =>
            array (
              0 => 'HTTP_X_FORWARDED_FOR',
            ),
          );
      strategy:
        type: RollingUpdate

    nginx:
      enabled: true
      image:
        repository: nginx
        tag: 1.25.3-alpine
        pullPolicy: IfNotPresent
      config:
        default: true

    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      host: postgres-nextcloud-rw:5432
      existingSecret:
        enabled: true
        secretName: nextcloud-secret
        usernameKey: datapase-username
        passwordKey: database-password
      database: ${NEXTCLOUD_DB_NAME}

    cronjob:
      enabled: true

    resources:
      requests:
        cpu: 34m
        memory: 204Mi
      limits:
        memory: 363Mi

    livenessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    readinessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    startupProbe:
      enabled: false
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1

    hpa:
      enabled: false
